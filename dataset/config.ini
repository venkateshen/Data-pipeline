; config.ini — defines the column distributions for the random CSV generator.
;
; Supported directives:
;   highrandom  → random integer in [1 000 000, 9 999 999]
;   medrandom   → random integer in [10 000, 99 999]
;   lowrandom   → random integer in [100, 999]
;   a,b,c,...   → random choice from the comma-separated list

[Columns]
customer=highrandom
order=highrandom
names=Richard,Ben,Nick,Aaron,John
region=east,west,central
item=pens,binder,paper
units=lowrandom
price=lowrandom
